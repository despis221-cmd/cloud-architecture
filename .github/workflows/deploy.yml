name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Run tests
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: local
          SPRING_CLOUD_AWS_PARAMETERSTORE_ENABLED: false

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/cloud-architecture

          docker build -t $IMAGE:$SHORT_SHA -t $IMAGE:latest .
          docker push $IMAGE:$SHORT_SHA
          docker push $IMAGE:latest

          echo "Pushed: $IMAGE:$SHORT_SHA"

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cloud-architecture:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 8080:8080 \
              --name my-app \
              -e SPRING_PROFILES_ACTIVE=prod \
              ${{ secrets.DOCKERHUB_USERNAME }}/cloud-architecture:latest